name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version

      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec project.yml
          xcodebuild -project MimoVoice.xcodeproj -list

      - name: Build iOS App
        run: |
          set -o pipefail
          xcodebuild \
            -project MimoVoice.xcodeproj \
            -scheme MiMoVoice \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            2>&1 | xcpretty || true
          
          # Check if build succeeded
          if [ ! -d "build/Build/Products/Release-iphoneos/MiMoVoice.app" ]; then
            echo "ERROR: Build failed - .app not found"
            exit 1
          fi
          echo "✅ Build succeeded"
          ls -la build/Build/Products/Release-iphoneos/MiMoVoice.app

      - name: Create IPA
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found!"
            find build -type d | head -20
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MimoVoice.ipa Payload
          rm -rf Payload
          ls -lh MimoVoice.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MimoVoice-IPA
          path: MimoVoice.ipa
          retention-days: 90
