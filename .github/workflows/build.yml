name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version

      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec project.yml
          xcodebuild -project MimoVoice.xcodeproj -list

      - name: Build iOS App
        run: |
          set -o pipefail
          xcodebuild \
            -project MimoVoice.xcodeproj \
            -scheme MiMoVoice \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            2>&1 | tail -50
          
          # Verify binary exists
          APP_DIR="build/Build/Products/Release-iphoneos/MiMoVoice.app"
          if [ ! -f "$APP_DIR/MiMoVoice" ]; then
            echo "ERROR: Binary not found!"
            ls -la "$APP_DIR/"
            exit 1
          fi
          echo "✅ Build succeeded - binary found:"
          file "$APP_DIR/MiMoVoice"
          ls -lh "$APP_DIR/MiMoVoice"

      - name: Create IPA
        run: |
          APP_DIR="build/Build/Products/Release-iphoneos/MiMoVoice.app"
          mkdir -p Payload
          cp -r "$APP_DIR" Payload/
          zip -r -y MimoVoice.ipa Payload
          rm -rf Payload
          ls -lh MimoVoice.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MimoVoice-IPA
          path: MimoVoice.ipa
          retention-days: 90
